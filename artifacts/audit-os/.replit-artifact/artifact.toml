kind = "web"
previewPath = "/"
title = "AuditOS"
version = "1.0.0"
id = "artifacts/audit-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22337

[services.development]
run = "pnpm --filter @workspace/audit-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audit-os", "run", "build" ]
publicDir = "artifacts/audit-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22337"
BASE_PATH = "/"
